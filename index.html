<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real-Time Teacher AI</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#eef4ff,#f7f9fc);
  color:#1f2a37;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.lang button {
  padding:6px 10px;
  margin-left:5px;
  border-radius:6px;
  border:1px solid #ccc;
  cursor:pointer;
}

.card {
  background:white;
  padding:25px;
  border-radius:18px;
  margin-top:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1 { color:#16325c; }

input, select, textarea {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

button.main {
  background:#2563eb;
  color:white;
  border:none;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
}

#output {
  margin-top:20px;
  padding:15px;
  background:#eef3ff;
  border-radius:12px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1 id="title"></h1>

<div class="lang">
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('uz')">UZ</button>
</div>
</div>

<div class="card">

<p id="subtitle"></p>

<select id="grade"></select>
<select id="subject"></select>

<textarea id="question"></textarea>

<button class="main" onclick="runDemo()" id="askBtn"></button>

<div id="output">...</div>

</div>

</div>

<script>

const t = {
en:{
title:"🎓 Real-Time Teacher AI",
subtitle:"AI-powered classroom assistant",
grades:["Grade 5","Grade 6","Grade 7","Grade 8","Grade 9","Grade 10"],
subjects:["Computer Science","Math","Physics","Biology","English"],
placeholder:"Type your question...",
ask:"Ask AI",
loading:"⏳ AI is thinking...",
result:(q,g,s)=>`📘 Explanation
${q} explained for ${g} ${s}

🧠 Key Points
• Simple explanation
• Real examples
• Clear steps

❓ Quiz
1. What is it?
2. Example?
3. Why useful?

📝 Homework
Explain in your own words.`
},

uz:{
title:"🎓 Real-Time Teacher AI",
subtitle:"AI o‘qituvchi yordamchi",
grades:["5-sinf","6-sinf","7-sinf","8-sinf","9-sinf","10-sinf"],
subjects:["Informatika","Matematika","Fizika","Biologiya","Ingliz tili"],
placeholder:"Savol yozing...",
ask:"So‘rash",
loading:"⏳ AI o‘ylayapti...",
result:(q,g,s)=>`📘 Tushuntirish
${q} ${g} ${s} uchun tushuntiriladi

🧠 Asosiy fikrlar
• Sodda tushuntirish
• Misollar
• Qadamlar

❓ Test
1. Nima bu?
2. Misol?
3. Nega kerak?

📝 Uy vazifa
O‘zing tushuntir.`
}
};

let lang = localStorage.getItem("lang") || "en";

function setLang(l){
  lang=l;
  localStorage.setItem("lang",l);
  render();
}

function render(){
  const d=t[lang];

  document.getElementById("title").innerText=d.title;
  document.getElementById("subtitle").innerText=d.subtitle;
  document.getElementById("question").placeholder=d.placeholder;
  document.getElementById("askBtn").innerText=d.ask;

  let g=document.getElementById("grade");
  let s=document.getElementById("subject");

  g.innerHTML=""; s.innerHTML="";

  d.grades.forEach(x=>{
    let o=document.createElement("option");
    o.text=x; g.add(o);
  });

  d.subjects.forEach(x=>{
    let o=document.createElement("option");
    o.text=x; s.add(o);
  });
}

function runDemo(){
  const d=t[lang];
  const q=document.getElementById("question").value;
  const g=document.getElementById("grade").value;
  const s=document.getElementById("subject").value;

  if(!q){
    document.getElementById("output").innerText="...";
    return;
  }

  document.getElementById("output").innerText=d.loading;

  setTimeout(()=>{
    document.getElementById("output").innerText=d.result(q,g,s);
  },800);
}

render();

</script>

</body>
</html>
