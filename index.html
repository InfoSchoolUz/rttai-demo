<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real-Time Teacher AI</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef4ff, #f7f9fc);
      color: #1f2a37;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      background: white;
      border-radius: 18px;
      padding: 32px 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      margin-top: 24px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: #e8f0ff;
      color: #2457d6;
      font-size: 13px;
      font-weight: bold;
      padding: 8px 14px;
      border-radius: 999px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 38px;
      line-height: 1.2;
      color: #16325c;
    }

    /* ✅ FAqat qo‘shilgan qism */
    .author {
      margin: 0 0 18px;
      font-size: 16px;
      font-weight: 600;
      color: #4a5b70;
    }

    .subtitle {
      max-width: 720px;
      margin: 0 auto;
      font-size: 17px;
      line-height: 1.6;
      color: #4a5b70;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 26px;
    }

    .nav a {
      text-decoration: none;
      color: #16325c;
      background: #f3f7ff;
      padding: 10px 16px;
      border-radius: 10px;
      font-weight: 600;
      border: 1px solid #dbe6ff;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 20px;
      margin-top: 24px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    .card h2 {
      margin-top: 0;
      margin-bottom: 12px;
      color: #16325c;
      font-size: 24px;
    }

    .muted {
      color: #5b6b7e;
      line-height: 1.6;
    }

    .demo-box {
      margin-top: 18px;
      text-align: left;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      color: #223a5e;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cfd8e3;
      border-radius: 12px;
      font-size: 15px;
      margin-bottom: 14px;
      background: #fbfcfe;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 6px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: #2563eb;
      color: white;
    }

    .secondary {
      background: #eef3ff;
      color: #1d4ed8;
    }

    .output {
      margin-top: 18px;
      background: #f7faff;
      border: 1px solid #dbe7ff;
      border-radius: 14px;
      padding: 16px;
      white-space: pre-wrap;
      line-height: 1.6;
      min-height: 140px;
      color: #23364d;
    }

    .feature-list {
      padding-left: 18px;
      line-height: 1.8;
      color: #425469;
    }

    .small-note {
      margin-top: 16px;
      font-size: 13px;
      color: #6b7280;
      line-height: 1.6;
    }

    .footer {
      text-align: center;
      color: #6b7280;
      font-size: 14px;
      margin: 28px 0 14px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 18px;
    }

    .link-btn {
      display: block;
      text-decoration: none;
      text-align: center;
      padding: 12px 14px;
      border-radius: 12px;
      font-weight: 700;
      background: #16325c;
      color: white;
    }

    .link-btn.alt {
      background: #eef3ff;
      color: #16325c;
      border: 1px solid #dbe6ff;
    }

    @media (max-width: 800px) {
      .grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 30px;
      }

      .container {
        padding: 16px;
      }

      .hero,
      .card {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <div class="badge">Public Interactive Demo</div>

      <h1>🎓 Real-Time Teacher AI</h1>
      <p class="author">Developed by Azamat Madrimov</p>

      <p class="subtitle">
        An AI-powered classroom assistant designed to help teachers and students
        with clear explanations, quick quizzes, homework ideas, and structured support.
      </p>

      <nav class="nav">
        <a href="#demo">Demo</a>
        <a href="#features">Features</a>
        <a href="#about">About</a>
        <a href="#links">Project Links</a>
      </nav>
    </section>
